<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Loss and recovery table</title>
  <desc id="desc">A table showing how much gain is needed to recover from trading capital losses.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061527"/>
      <stop offset="0.55" stop-color="#0d2138"/>
      <stop offset="1" stop-color="#04101e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#112a44"/>
      <stop offset="1" stop-color="#081929"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#75f0ff"/>
      <stop offset="1" stop-color="#f0a84f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="42" fill="url(#bg)"/>
  <path d="M70 118H1130M70 238H1130M70 358H1130M70 478H1130M70 598H1130" stroke="#9bd7ff" stroke-opacity="0.055"/>
  <path d="M180 70V690M390 70V690M600 70V690M810 70V690M1020 70V690" stroke="#9bd7ff" stroke-opacity="0.045"/>

  <text x="80" y="112" fill="#eef7ff" font-family="Manrope, Arial, sans-serif" font-size="54" font-weight="900" letter-spacing="-1.5">Risk is asymmetric</text>
  <text x="82" y="157" fill="#9fb4c8" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="700">The deeper the drawdown, the harder the recovery becomes.</text>

  <g filter="url(#shadow)">
    <rect x="85" y="220" width="420" height="404" rx="28" fill="url(#card)" stroke="#9bd7ff" stroke-opacity="0.18"/>
    <rect x="695" y="220" width="420" height="404" rx="28" fill="url(#card)" stroke="#9bd7ff" stroke-opacity="0.18"/>
  </g>

  <text x="125" y="274" fill="#73f0ff" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="900" letter-spacing="2">LOSS OF CAPITAL</text>
  <text x="735" y="274" fill="#73f0ff" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="900" letter-spacing="2">GAIN NEEDED TO RECOVER</text>

  <g font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="900">
    <text x="160" y="340" fill="#eef7ff">10%</text>
    <text x="160" y="382" fill="#eef7ff">20%</text>
    <text x="160" y="424" fill="#eef7ff">30%</text>
    <text x="160" y="466" fill="#eef7ff">40%</text>
    <text x="160" y="508" fill="#eef7ff">50%</text>
    <text x="160" y="550" fill="#eef7ff">60%</text>
    <text x="160" y="592" fill="#ffb0a2">70%</text>

    <text x="780" y="340" fill="#eef7ff">11.1%</text>
    <text x="780" y="382" fill="#eef7ff">25%</text>
    <text x="780" y="424" fill="#eef7ff">42.9%</text>
    <text x="780" y="466" fill="#eef7ff">66.7%</text>
    <text x="780" y="508" fill="#f0a84f">100%</text>
    <text x="780" y="550" fill="#ffb0a2">150%</text>
    <text x="780" y="592" fill="#ff8b73">233%</text>
  </g>

  <g stroke="#9bd7ff" stroke-opacity="0.12">
    <path d="M125 356H465M125 398H465M125 440H465M125 482H465M125 524H465M125 566H465"/>
    <path d="M735 356H1075M735 398H1075M735 440H1075M735 482H1075M735 524H1075M735 566H1075"/>
  </g>

  <path d="M552 420H648" stroke="url(#hot)" stroke-width="8" stroke-linecap="round"/>
  <path d="M624 392L654 420L624 448" fill="none" stroke="url(#hot)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="86" y="650" width="1028" height="56" rx="18" fill="#73f0ff" fill-opacity="0.08" stroke="#73f0ff" stroke-opacity="0.18"/>
  <text x="112" y="686" fill="#eef7ff" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">Small losses are manageable. Deep drawdowns demand extraordinary gains just to get back to break-even.</text>
</svg>
